name: Build Dylib
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest  # هذا هو التغيير الجوهري
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Theos and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential perl git curl libssl-dev
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "~/theos/bin" >> $GITHUB_PATH

      - name: Build Tweak
        run: |
          cd template
          make package FINALPACKAGE=1
        env:
          THEOS: ~/theos

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyModDylib
          path: |
            template/packages/*.deb
            template/.theos/obj/debug/*.dylib
